name: studysprint
description: Focus session platform for students
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3
  provider: ^6.1.1
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  flutter_local_notifications: ^21.0.0
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  fl_chart: ^0.69.0
  http: ^1.2.2
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
